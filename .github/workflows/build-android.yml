name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Remote-ADB-App/**/*.gradle*', 'Remote-ADB-App/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew permission
        run: chmod +x Remote-ADB-App/gradlew

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > Remote-ADB-App/local.properties

      - name: Read version name
        id: ver
        working-directory: Remote-ADB-App
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed "s/.*versionName[[:space:]]*['\"]//;s/['\"].*//")
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "apk=remote-adb-v$VERSION.apk" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        working-directory: Remote-ADB-App
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp Remote-ADB-App/app/build/outputs/apk/debug/app-debug.apk \
             Remote-ADB-App/app/build/outputs/apk/debug/${{ steps.ver.outputs.apk }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-adb-apk
          path: Remote-ADB-App/app/build/outputs/apk/debug/${{ steps.ver.outputs.apk }}
          retention-days: 30

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.ver.outputs.tag }} \
            Remote-ADB-App/app/build/outputs/apk/debug/${{ steps.ver.outputs.apk }} \
            --repo ${{ github.repository }} --clobber
