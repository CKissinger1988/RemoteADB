<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
  <title>Remote ADB Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    h1 {
      font-size: 1.1rem;
      color: #a78bfa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .panel {
      background: #16213e;
      border: 1px solid #2d3a5e;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #818cf8;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.9rem;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #6366f1;
    }

    button {
      padding: 7px 14px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #818cf8; }

    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:not(:disabled):hover { background: #f87171; }

    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:not(:disabled):hover { background: #475569; }

    #statusLog {
      flex: 1;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 5px;
      padding: 10px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.82rem;
      color: #94a3b8;
      overflow-y: auto;
      white-space: pre-wrap;
      min-height: 160px;
      max-height: 300px;
    }
  </style>
</head>
<body>
  <h1>Remote ADB Control</h1>

  <div class="panel">
    <h2>Connect Device</h2>
    <div class="row">
      <input id="deviceId" type="text" placeholder="Device ID (e.g. emulator-5554 or 192.168.1.x:5555)" />
      <button id="connectBtn" class="btn-primary">Connect</button>
      <button id="disconnectBtn" class="btn-danger" disabled>Disconnect</button>
    </div>
  </div>

  <div class="panel">
    <h2>Shell Command</h2>
    <div class="row">
      <input id="commandInput" type="text" placeholder="Enter ADB shell command (e.g. getprop ro.product.model)" />
      <button id="sendCommandBtn" class="btn-secondary" disabled>Run</button>
    </div>
  </div>

  <div class="panel" style="flex:1;">
    <h2>Output Log</h2>
    <div id="statusLog">Ready. Enter a device ID and click Connect.</div>
  </div>

  <script src="src/renderer.js"></script>
</body>
</html>
